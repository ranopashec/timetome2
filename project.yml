name: TimeTo

options:
  bundleIdPrefix: com.architect
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug:   debug
  Release: release

targets:
  TimeTo:
    type: application
    platform: macOS
    sources:
      - path: TimeTo
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.architect.timetome
        INFOPLIST_FILE: TimeTo/Info.plist
        CODE_SIGN_ENTITLEMENTS: TimeTo/TimeTo.entitlements
        PRODUCT_NAME: TimeTo
    scheme:
      testTargets: []
